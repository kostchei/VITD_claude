<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <g fill="none" stroke="#1a1714" stroke-width="3.2" stroke-linejoin="round" stroke-linecap="round">
    <!-- intact city skyline: denser towers, flat tops -->
    <path d="M8 52
      L8 34 L14 34 L14 25 L20 25 L20 34 L27 34 L27 14 L34 14 L34 34
      L40 34 L40 22 L46 22 L46 29 L52 29 L52 17 L57 17 L57 52 Z"/>
    <!-- windows -->
    <g stroke-width="2.0">
      <rect x="10" y="40" width="3.5" height="5"/>
      <rect x="29" y="20" width="4" height="5"/>
      <rect x="29" y="29" width="4" height="5"/>
      <rect x="47" y="38" width="3.5" height="5"/>
    </g>
    <!-- flag pole rising from the tallest tower -->
    <line x1="30.5" y1="14" x2="30.5" y2="3"/>
  </g>
  <!-- pennant flag (filled) marks an inhabited settlement -->
  <path d="M30.5 3.5 L44 7.5 L30.5 11.5 Z" fill="#1a1714" stroke="#1a1714" stroke-width="2" stroke-linejoin="round"/>
</svg>
